services:
    pipeline:
        build:
            context: ./pipeline
        ports:
            - "8000:8000"
        environment:
            PIPELINE_API_KEY: ${PIPELINE_API_KEY}
            MAX_WORKERS: ${MAX_WORKERS:-1}
            JOB_TTL_SECONDS: ${JOB_TTL_SECONDS:-300}
            MAX_IMAGE_BYTES: ${MAX_IMAGE_BYTES:-10485760}
        restart: unless-stopped

    backend:
        build:
            context: ./backend
        ports:
            - "8001:8000"
        environment:
            PIPELINE_URL: http://pipeline:8000
            PIPELINE_API_KEY: ${PIPELINE_API_KEY}
            JWT_SECRET: ${JWT_SECRET}
            SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-1800}
            RATE_LIMIT_JOBS: ${RATE_LIMIT_JOBS:-5}
            RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-600}
            ALLOW_ORIGINS: ${ALLOW_ORIGINS:-*}
        depends_on:
            - pipeline
        restart: unless-stopped
